name: Short-term Scraper Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers and System Dependencies
        run: |
          python -m playwright install --with-deps chromium

      - name: Run Scraper Test
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python trustpilot_scraper.py --input-dir test_input_dir --output-dir test_results --num-processes 1 --max-parts 1

      - name: Test Hugging Face Push
        env:
          HF_TOKEN: ${{ secrets.HG_ACCESS_TOKEN }}
        run: |
          python -c "
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ.get('HF_TOKEN'))
          repo_id = 'axrafTic/trustpilot'
          api.create_repo(repo_id=repo_id, repo_type='dataset', exist_ok=True)
          with open('file.txt', 'w') as f:
              f.write('Test Hugging Face authentication')
          api.upload_file(path_or_fileobj='file.txt', path_in_repo='file.txt', repo_id=repo_id, repo_type='dataset')
          print('Successfully authenticated and pushed test file to Hugging Face!')
          "
